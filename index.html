<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Selection - Pro Academy</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 🚫 AD-SHIELD */
        iframe, ins, .appgeyser-ad-unit, [id*="ads"] { display: none !important; }

        :root { --bg: #0a0e17; --primary: #1d4ed8; --card-bg: #161b26; --accent: #f97316; --purple: #7c3aed; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; }

        /* AUTH & PAGES */
        #view-auth { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 30px; }
        .page { display: none; padding-bottom: 90px; }
        .active { display: block; }

        /* HEADER & STATS */
        .header { padding: 25px; background: linear-gradient(to right, #1e40af, #1e3a8a); border-radius: 0 0 30px 30px; }
        
        /* EXAM & SECTION CARDS */
        .exam-card { background: var(--card-bg); margin: 15px 20px; padding: 20px; border-radius: 20px; border-left: 6px solid var(--primary); }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-sm { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; color: white; }
        .btn-video { background: #ef4444; } /* YouTube Red */
        .btn-quiz { background: #10b981; }  /* Success Green */

        /* PROFILE */
        .profile-card { background: #1e293b; margin: 20px; padding: 25px; border-radius: 20px; border: 1px solid #334155; }
        .avatar { width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 10px; }

        .input-field { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; }
        .btn-main { background: var(--accent); color: white; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: 700; }

        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1f2937; }
        .nav-item { text-align: center; color: #64748b; font-size: 11px; cursor: pointer; }
        .active-nav { color: white; }
    </style>
</head>
<body>

    <div id="view-auth">
        <div style="background:#1e293b; padding:30px; border-radius:25px; text-align:center;">
            <h1 style="color:var(--accent); margin-bottom:10px;">Study Selection</h1>
            <p style="color:#94a3b8; margin-bottom:30px;">Login to Constitution Series</p>
            <input type="text" id="login-name" class="input-field" placeholder="Enter Your Name">
            <button onclick="handleLogin()" class="btn-main">LOGIN</button>
        </div>
    </div>

    <div id="page-home" class="page">
        <div class="header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><p style="font-size:12px; opacity:0.7;">Welcome,</p><h2 id="user-head">User</h2></div>
                <button onclick="logout()" style="background:none; border:1px solid white; color:white; padding:4px 10px; border-radius:8px; font-size:11px;">LOGOUT</button>
            </div>
        </div>
        <div style="padding:20px 20px 0 20px;"><h3>Recommended for You</h3></div>
        <div id="render-exams"></div>
    </div>

    <div id="page-profile" class="page">
        <div class="header"><h2>Student Profile</h2></div>
        <div class="profile-card">
            <div class="avatar" id="avatar">U</div>
            <h3 id="prof-name">User Name</h3>
            <p style="font-size:12px; color:#94a3b8; margin-bottom:15px;">Student Account Verified</p>
            <div style="border-top:1px solid #334155; padding-top:10px;">
                <p><strong>Target:</strong> <span id="disp-target" style="color:var(--accent);">Not Set</span></p>
                <p><strong>Contact:</strong> <span id="disp-phone" style="color:#94a3b8;">Not Linked</span></p>
            </div>
        </div>
        <div style="padding:20px;">
            <input type="text" id="in-phone" class="input-field" placeholder="Update Phone Number">
            <input type="text" id="in-exam" class="input-field" placeholder="Update Target Exam">
            <button onclick="updateProfile()" class="btn-main">SYNC TO CLOUD</button>
        </div>
    </div>

    <nav id="navbar" style="display:none;">
        <div class="nav-item active-nav" onclick="showPage('home')">🏠<br>Home</div>
        <div class="nav-item" onclick="showPage('profile')">👤<br>Profile</div>
    </nav>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAssYG20lFBlE6pHdVMZjuN-7mN-K3Yx1M",
          authDomain: "study-selection.firebaseapp.com",
          databaseURL: "https://study-selection-default-rtdb.firebaseio.com",
          projectId: "study-selection",
          storageBucket: "study-selection.appspot.com",
          messagingSenderId: "511233122426",
          appId: "1:511233122426:web:7a4fb8e0df62f0f803f262"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 📚 Comprehensive Exam List with Video/Quiz links placeholder
        const exams = [
            { name: "Constitution Series", sub: "Article 1 to 395", video: "#", quiz: "#" },
            { name: "UPSC Prelims", sub: "General Studies & CSAT", video: "#", quiz: "#" },
            { name: "SSC CGL (Tier I)", sub: "Maths, Reasoning, English, GA", video: "#", quiz: "#" },
            { name: "SSC CHSL", sub: "Combined Higher Secondary", video: "#", quiz: "#" },
            { name: "Banking (PO/Clerk)", sub: "Quant & Aptitude", video: "#", quiz: "#" }
        ];

        function handleLogin() {
            const n = document.getElementById('login-name').value;
            if(!n) return alert("Please enter name");
            localStorage.setItem('study_user', n);
            location.reload();
        }

        window.onload = () => {
            const user = localStorage.getItem('study_user');
            if(user) {
                document.getElementById('view-auth').style.display = 'none';
                document.getElementById('navbar').style.display = 'flex';
                showPage('home');
                document.getElementById('user-head').innerText = user;
                document.getElementById('prof-name').innerText = user;
                document.getElementById('avatar').innerText = user[0].toUpperCase();
                
                db.ref('users/' + user).on('value', s => {
                    const d = s.val();
                    if(d) {
                        document.getElementById('disp-target').innerText = d.exam || 'Not Set';
                        document.getElementById('disp-phone').innerText = d.phone || 'Not Linked';
                    }
                });
                renderExams();
            }
        };

        function renderExams() {
            const container = document.getElementById('render-exams');
            container.innerHTML = exams.map(ex => `
                <div class="exam-card">
                    <strong>${ex.name}</strong><br>
                    <small style="color:#94a3b8">${ex.sub}</small>
                    <div class="action-btns">
                        <button class="btn-sm btn-video" onclick="alert('Opening Video Lecture...')">🎥 VIDEO</button>
                        <button class="btn-sm btn-quiz" onclick="alert('Starting Daily Quiz...')">📝 QUIZ</button>
                    </div>
                </div>
            `).join('');
        }

        function updateProfile() {
            const u = localStorage.getItem('study_user');
            const phone = document.getElementById('in-phone').value;
            const exam = document.getElementById('in-exam').value;
            db.ref('users/' + u).update({ phone, exam });
            alert("Profile Updated!");
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
        }

        function logout() { localStorage.removeItem('study_user'); location.reload(); }
    </script>
</body>
</html>
