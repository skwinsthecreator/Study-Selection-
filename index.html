<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Selection</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7fe; color: #333; }
        .screen { height: 100vh; width: 100%; position: fixed; display: none; overflow-y: auto; }
        #login-screen { display: flex; background: #1e3a8a; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: #1e3a8a; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; background: #1e3a8a; font-size: 16px; margin-top: 10px; }
        header { background: #1e3a8a; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; position: sticky; top: 0; z-index: 10; shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card { background: white; margin: 15px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        iframe { width: 100%; height: 200px; border-radius: 12px; border: none; margin-top: 10px; background: #000; }
        .notice-bar { background: #fff9c4; padding: 12px; text-align: center; font-weight: bold; border-bottom: 2px solid #fbc02d; color: #856404; }
        .logout-btn { font-size: 12px; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 5px; float: right; margin-top: -30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen" style="display: flex;">
        <div class="login-box">
            <h1 style="color:#1e3a8a; margin-bottom: 5px;">Study Selection</h1>
            <p style="color:#666; margin-bottom: 20px;">Quality Education for All</p>
            <input type="text" id="user-id" placeholder="Enter Your Name or ID">
            <button onclick="login()" class="btn">Login Now</button>
        </div>
    </div>

    <div id="admin-screen" class="screen">
        <header>Admin Panel</header>
        <div class="logout-btn" onclick="location.reload()" style="margin-right:15px; margin-top: -35px;">Logout</div>
        <div class="card">
            <h3>📢 Update Notice</h3>
            <input type="text" id="admin-note" placeholder="Write something new...">
            <button onclick="updateNotice()" class="btn">Push Notice</button>
        </div>
        <div class="card">
            <h3>📹 Post Video Class</h3>
            <input type="text" id="v-name" placeholder="Class Name (e.g. Article 1)">
            <input type="text" id="v-id" placeholder="YouTube Link or ID">
            <button onclick="updateVideo()" class="btn">Publish Video</button>
        </div>
    </div>

    <div id="student-screen" class="screen">
        <header>Study Selection</header>
        <div class="logout-btn" onclick="location.reload()" style="margin-right:15px; margin-top: -35px;">Logout</div>
        <div id="stu-notice" class="notice-bar">📢 Welcome to your class!</div>
        <div id="video-display"></div>
    </div>

    <script>
        // FIREBASE CONFIG (Copied from your photo 1000005398.jpg)
        const firebaseConfig = {
          apiKey: "AIzaSyAssYG20lFBlE6pHdVMZjuN-7mN-K3Yx1M",
          authDomain: "study-selection.firebaseapp.com",
          databaseURL: "https://study-selection-default-rtdb.firebaseio.com",
          projectId: "study-selection",
          storageBucket: "study-selection.appspot.com",
          messagingSenderId: "511233122426",
          appId: "1:511233122426:web:7a4fb8e0df62f0f803f262"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const id = document.getElementById('user-id').value;
            if(!id) return alert("Enter ID first!");
            
            document.getElementById('login-screen').style.display = 'none';
            if(id.toLowerCase() === "admin123") {
                document.getElementById('admin-screen').style.display = 'block';
            } else {
                document.getElementById('student-screen').style.display = 'block';
                startSync();
            }
        }

        function updateNotice() {
            const note = document.getElementById('admin-note').value;
            db.ref('appData/notice').set(note).then(() => alert("Notice Updated!"));
        }

        function updateVideo() {
            const name = document.getElementById('v-name').value;
            let vid = document.getElementById('v-id').value;
            // Extract ID if full link is pasted
            if(vid.includes("v=")) vid = vid.split("v=")[1].split("&")[0];
            if(vid.includes("be/")) vid = vid.split("be/")[1].split("?")[0];
            
            db.ref('appData/video').set({ title: name, id: vid }).then(() => alert("Video Published!"));
        }

        function startSync() {
            // Realtime Update for Notice
            db.ref('appData/notice').on('value', (snap) => {
                if(snap.exists()) document.getElementById('stu-notice').innerText = "📢 " + snap.val();
            });
            // Realtime Update for Video
            db.ref('appData/video').on('value', (snap) => {
                const data = snap.val();
                if(data && data.id) {
                    document.getElementById('video-display').innerHTML = `
                        <div class="card">
                            <h4 style="margin-bottom:10px;">${data.title}</h4>
                            <iframe src="https://www.youtube.com/embed/${data.id}" allowfullscreen></iframe>
                        </div>`;
                }
            });
        }
    </script>
</body>
</html>
