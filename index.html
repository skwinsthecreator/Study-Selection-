<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Selection Ultra</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a1122; --card: #121e36; --text: #f1f5f9; --gray: #94a3b8; --accent: #f97316; --upsc: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); --ssc: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }
        .light-mode { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --gray: #64748b; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background 0.3s; }
        body { background: var(--bg); color: var(--text); font-size: 14px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .btn { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; border: none; }
        .btn-p { background: var(--accent); color: white; width: 100%; }
        .input-d { width: 100%; padding: 12px; background: rgba(128,128,128,0.1); color: var(--text); border-radius: 10px; border: 1px solid rgba(128,128,128,0.2); margin-bottom: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(128,128,128,0.1); }

        /* News Ticker */
        .ticker-wrap { background: #ef4444; color: white; padding: 5px 0; overflow: hidden; white-space: nowrap; font-size: 12px; font-weight: bold; }
        .ticker { display: inline-block; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Screens */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg); }
        .login-box { background: var(--card); padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .profile { width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; }

        /* Exam Grid */
        .grid { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .e-card { padding: 20px; border-radius: 18px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        
        /* Quiz Section */
        .quiz-box { border-left: 4px solid var(--accent); }
        .quiz-option { display: block; background: rgba(128,128,128,0.1); padding: 10px; margin: 5px 0; border-radius: 8px; cursor: pointer; }

        /* Bottom Nav */
        nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(128,128,128,0.1); }
    </style>
</head>
<body>

    <div class="ticker-wrap"><div class="ticker" id="live-ticker">Breaking News: New Study Material Added for UPSC Prelims! Stay Tuned.</div></div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom:10px;">Study Selection</h2>
            <p style="color:var(--gray); margin-bottom:20px;">Quality Education for All</p>
            <input type="text" id="user-id" class="input-d" placeholder="Enter Your Name">
            <button onclick="doLogin()" class="btn btn-p">Procced to Study</button>
        </div>
    </div>

    <div id="stu-screen" class="hidden" style="padding-bottom: 80px;">
        <header>
            <div><p style="font-size:12px; color:var(--gray);">HELLO,</p><h2 id="greet">Student</h2></div>
            <div style="display:flex; gap:10px;">
                <button onclick="toggleTheme()" style="background:none; border:none; font-size:20px; cursor:pointer;">🌓</button>
                <div class="profile" id="p-icon">S</div>
            </div>
        </header>

        <div class="grid">
            <div class="card quiz-box">
                <h4>🧠 Quiz of the Day</h4>
                <p id="q-txt" style="font-size:13px; margin:5px 0;">Loading Question...</p>
                <div id="q-opt"></div>
            </div>

            <h3>Exam Categories</h3>
            <div id="exam-container" class="grid" style="padding:0;"></div>
            
            <div id="v-area" style="margin-top:10px;"></div>
            <div id="n-area" style="margin-top:10px;"></div>
        </div>

        <nav>
            <div onclick="location.reload()" style="text-align:center; color:var(--accent);">🏠<br>Home</div>
            <div onclick="doLogout()" style="text-align:center; color:var(--gray);">👤<br>Logout</div>
        </nav>
    </div>

    <div id="adm-screen" class="hidden" style="padding:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Admin Panel</h2>
            <button onclick="doLogout()" class="btn" style="background:red; color:white;">Logout</button>
        </div>
        <div class="card">
            <h4>📢 Update News Ticker</h4>
            <input type="text" id="t-input" class="input-d" placeholder="Enter scrolling news">
            <button onclick="setD('ticker', document.getElementById('t-input').value)" class="btn btn-p">Update</button>
        </div>
        <div class="card">
            <h4>📹 Video & 📄 PDF Note</h4>
            <input type="text" id="v-ti" class="input-d" placeholder="Topic Title">
            <input type="text" id="v-li" class="input-d" placeholder="YouTube Video ID">
            <input type="text" id="p-li" class="input-d" placeholder="PDF Google Drive Link">
            <button onclick="saveCon()" class="btn btn-p">Publish Both</button>
        </div>
        <div class="card">
            <h4>📊 Active Students</h4>
            <div id="stu-list" style="font-size:12px; color:var(--gray);">No data yet.</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAssYG20lFBlE6pHdVMZjuN-7mN-K3Yx1M",
          authDomain: "study-selection.firebaseapp.com",
          databaseURL: "https://study-selection-default-rtdb.firebaseio.com",
          projectId: "study-selection",
          storageBucket: "study-selection.appspot.com",
          messagingSenderId: "511233122426",
          appId: "1:511233122426:web:7a4fb8e0df62f0f803f262"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const exams = [
            {n:"UPSC", d:"IAS, IPS, IFS Stages", g:"var(--upsc)"},
            {n:"SSC", d:"CGL, CHSL, MTS", g:"var(--ssc)"},
            {n:"Teaching", d:"CTET, UPTET, KVS", g:"linear-gradient(135deg, #f59e0b 0%, #d97706 100%)"},
            {n:"Railway", d:"RRB NTPC, Group D", g:"linear-gradient(135deg, #10b981 0%, #059669 100%)"}
        ];

        function doLogin() {
            const id = document.getElementById('user-id').value;
            if(!id) return alert("Name please!");
            localStorage.setItem('studyU', id);
            if(id.toLowerCase() !== 'admin123') db.ref('stats/'+id.replace(/\s/g,'_')).set({lastLogin: new Date().toLocaleString()});
            location.reload();
        }

        window.onload = () => {
            const u = localStorage.getItem('studyU');
            if(!u) return;
            document.getElementById('login-screen').classList.add('hidden');
            if(u.toLowerCase() === 'admin123') {
                document.getElementById('adm-screen').classList.remove('hidden');
                loadAdm();
            } else {
                document.getElementById('stu-screen').classList.remove('hidden');
                document.getElementById('greet').innerText = u;
                document.getElementById('p-icon').innerText = u[0].toUpperCase();
                loadEx(); loadStu();
            }
        };

        function loadEx() {
            let h = '';
            exams.forEach(e => {
                h += `<div class="e-card" style="background:${e.g}" onclick="alert('Accessing ${e.n} Study Material...')"><div><h4>${e.n}</h4><p style="font-size:10px;">${e.d}</p></div><span>→</span></div>`;
            });
            document.getElementById('exam-container').innerHTML = h;
        }

        function saveCon() {
            const t = document.getElementById('v-ti').value;
            const v = document.getElementById('v-li').value;
            const p = document.getElementById('p-li').value;
            db.ref('appData').update({vTitle:t, vId:v, pdf:p}).then(()=>alert("Content Live!"));
        }

        function setD(path, val) { db.ref('appData/'+path).set(val).then(()=>alert("Updated!")); }

        function loadStu() {
            db.ref('appData/ticker').on('value', s => { if(s.val()) document.getElementById('live-ticker').innerText = s.val(); });
            db.ref('appData').on('value', s => {
                const d = s.val();
                if(d.vId) {
                    document.getElementById('v-area').innerHTML = `<h3>Latest Class</h3><div class="card"><h4>${d.vTitle}</h4><iframe width="100%" height="200" src="https://www.youtube.com/embed/${d.vId}" frameborder="0" allowfullscreen style="border-radius:15px; margin-top:10px;"></iframe></div>`;
                }
                if(d.pdf) {
                    document.getElementById('n-area').innerHTML = `<div class="card" style="background:var(--accent); color:white; text-align:center;"><h4>Download PDF Notes</h4><a href="${d.pdf}" target="_blank" style="color:white; text-decoration:underline;">Click here to Open</a></div>`;
                }
            });
            // Fake Quiz Logic for Demo
            document.getElementById('q-txt').innerText = "Which Article of the Constitution deals with Article 1?";
            document.getElementById('q-opt').innerHTML = `<div class="quiz-option" onclick="alert('Correct!')">Name and territory of the Union</div><div class="quiz-option" onclick="alert('Try Again')">Citizenship</div>`;
        }

        function loadAdm() {
            db.ref('stats').on('value', s => {
                let h = '';
                s.forEach(c => { h += `• ${c.key.replace(/_/g,' ')} (Active: ${c.val().lastLogin})<br>`; });
                document.getElementById('stu-list').innerHTML = h || "No active students.";
            });
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function doLogout() { localStorage.removeItem('studyU'); location.reload(); }
    </script>
</body>
</html>
