<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Selection - Professional Academy</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           🚫 AGGRESSIVE AD-BLOCKER SYSTEM 
           ========================================= */
        iframe, ins, .appgeyser-ad-unit, [id*="ads"], [class*="ads"], 
        [id*="p_"], div[style*="z-index: 2147483647"], div[style*="fixed"],
        script[src*="appsgeyser"], a[href*="appsgeyser"] {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            height: 0 !important;
            width: 0 !important;
            position: absolute !important;
            top: -5000px !important;
            left: -5000px !important;
            pointer-events: none !important;
            z-index: -999 !important;
        }

        /* =========================================
           🎨 PROFESSIONAL UI DESIGN (CareerWill)
           ========================================= */
        :root {
            --primary: #002e6e;
            --secondary: #f97316;
            --bg: #f4f7fa;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background: var(--bg); color: var(--text-dark); overflow-x: hidden; min-height: 100vh; }

        /* Login Styling */
        .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 25px; background: var(--primary); }
        .login-card { background: var(--white); width: 100%; max-width: 400px; padding: 45px 30px; border-radius: 25px; box-shadow: var(--shadow); text-align: center; }
        .login-card h2 { color: var(--primary); font-size: 28px; margin-bottom: 10px; font-weight: 700; }
        
        /* Header Styling */
        .app-header { background: var(--primary); color: var(--white); padding: 40px 20px 30px 20px; border-radius: 0 0 35px 35px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-bottom: 25px; }
        .app-header p { font-size: 14px; opacity: 0.8; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; }
        .app-header h2 { font-size: 24px; font-weight: 600; }

        /* Dashboard Items */
        .content-area { padding: 0 20px 100px 20px; }
        .section-title { font-size: 16px; font-weight: 600; color: var(--text-light); margin-bottom: 15px; display: block; }
        
        .exam-card { 
            background: var(--white); padding: 22px; border-radius: 18px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 6px solid var(--secondary); box-shadow: var(--shadow);
            cursor: pointer; transition: all 0.3s ease;
        }
        .exam-card:active { transform: scale(0.96); background: #f8fafc; }
        .exam-card span { font-size: 17px; font-weight: 600; color: var(--primary); }
        .exam-card i { color: var(--secondary); font-weight: bold; font-size: 20px; }

        /* Forms & Buttons */
        .input-group { width: 100%; padding: 16px; border-radius: 14px; border: 1.5px solid #e2e8f0; margin-bottom: 15px; outline: none; font-size: 15px; transition: 0.3s; }
        .input-group:focus { border-color: var(--secondary); }
        .btn-action { background: var(--secondary); color: var(--white); padding: 16px; border-radius: 14px; border: none; width: 100%; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3); }

        /* Admin Layout */
        .admin-card { background: var(--white); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .log-item { padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--white); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .nav-item { text-align: center; color: var(--text-light); font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: 700; }

        .hidden { display: none !important; }
        .page-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; padding-bottom: 90px; }
    </style>
</head>
<body>

    <div id="view-login" class="login-container">
        <div class="login-card">
            <h2>PRO ACADEMY</h2>
            <p style="color: #64748b; margin-bottom: 30px;">Study Selection Portal</p>
            <input type="text" id="user-input" class="input-group" placeholder="Enter Your Full Name">
            <button onclick="handleUserAuth()" class="btn-action">LOGIN TO DASHBOARD</button>
        </div>
    </div>

    <div id="view-dashboard" class="hidden">
        <div class="app-header">
            <p>Welcome Back,</p>
            <h2 id="user-display">Student</h2>
        </div>
        <div class="content-area">
            <span class="section-title">Explore Your Courses</span>
            <div id="exam-container">
                </div>
        </div>
        <nav>
            <div class="nav-item active" onclick="location.reload()">🏠<br>Home</div>
            <div class="nav-item" onclick="showAttendance()">📅<br>History</div>
            <div class="nav-item" onclick="processLogout()">👤<br>Logout</div>
        </nav>
    </div>

    <div id="view-admin" class="hidden" style="padding: 20px; padding-bottom: 100px;">
        <div class="app-header" style="border-radius: 20px; padding: 25px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="font-size: 20px;">Admin Panel</h2>
            <button onclick="processLogout()" style="background: none; border: none; color: white; font-weight: bold;">Logout</button>
        </div>

        <div class="admin-card">
            <h4 style="margin-bottom: 15px; color: var(--primary);">Add/Edit Exam Data</h4>
            <input type="text" id="adm-name" class="input-group" placeholder="Exam Name (e.g. SSC CGL)">
            <input type="text" id="adm-parent" class="input-group" placeholder="Parent Category (e.g. SSC) - Optional">
            <input type="text" id="adm-stages" class="input-group" placeholder="Stages (e.g. Prelims, Mains, Interview)">
            <button onclick="syncDataToFirebase()" class="btn-action">SAVE CATEGORY</button>
        </div>

        <div id="admin-exam-list">
            </div>

        <div class="admin-card">
            <h4 style="margin-bottom: 10px; color: var(--primary);">Live Student Logs</h4>
            <div id="log-render" style="max-height: 250px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="view-nested" class="hidden page-overlay">
        <div onclick="this.parentElement.classList.add('hidden')" style="color: var(--primary); font-weight: 700; margin-bottom: 20px; cursor: pointer;">← BACK TO HOME</div>
        <h2 id="nested-title" style="margin-bottom: 20px; border-left: 5px solid var(--secondary); padding-left: 12px; color: var(--primary);"></h2>
        <div id="nested-render"></div>
    </div>

    <script>
        // FIREBASE INITIALIZATION
        const firebaseConfig = {
          apiKey: "AIzaSyAssYG20lFBlE6pHdVMZjuN-7mN-K3Yx1M",
          authDomain: "study-selection.firebaseapp.com",
          databaseURL: "https://study-selection-default-rtdb.firebaseio.com",
          projectId: "study-selection",
          storageBucket: "study-selection.appspot.com",
          messagingSenderId: "511233122426",
          appId: "1:511233122426:web:7a4fb8e0df62f0f803f262"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 🛡️ AD-KILLER ENGINE (Nuclear Mode)
        function cleanAds() {
            const forbidden = document.querySelectorAll('iframe, ins, .appgeyser-ad-unit, [id*="ads"], div[style*="fixed"]');
            forbidden.forEach(el => {
                if(!el.id.includes('view-') && !el.classList.contains('page-overlay')) {
                    el.remove();
                }
            });
        }
        setInterval(cleanAds, 100);

        // AUTHENTICATION LOGIC
        function handleUserAuth() {
            const val = document.getElementById('user-input').value.trim();
            if(!val) return alert("Please enter your name!");
            
            if(val.toLowerCase() !== 'admin123') {
                database.ref('attendance_logs/' + val.replace(/\s/g,'_')).push({
                    timestamp: new Date().toLocaleString(),
                    device: navigator.userAgent.substring(0, 50)
                });
            }
            localStorage.setItem('pro_auth_user', val);
            location.reload();
        }

        window.onload = () => {
            const activeUser = localStorage.getItem('pro_auth_user');
            if(!activeUser) return;

            document.getElementById('view-login').classList.add('hidden');
            if(activeUser.toLowerCase() === 'admin123') {
                document.getElementById('view-admin').classList.remove('hidden');
                runAdminModule();
            } else {
                document.getElementById('view-dashboard').classList.remove('hidden');
                document.getElementById('user-display').innerText = activeUser;
                runStudentModule();
            }
        };

        // STUDENT DASHBOARD MODULE
        function runStudentModule() {
            database.ref('master_exams').on('value', snapshot => {
                const data = snapshot.val() || {
                    "SSC": {name: "SSC Exams", parent: ""},
                    "UPSC": {name: "UPSC Civil Services", parent: ""},
                    "Banking": {name: "Banking & Insurance", parent: ""},
                    "Railway": {name: "Railway Recruitment", parent: ""},
                    "Defence": {name: "Defence Forces", parent: ""}
                };
                const container = document.getElementById('exam-container');
                container.innerHTML = '';
                
                for(let key in data) {
                    if(!data[key].parent) {
                        const card = document.createElement('div');
                        card.className = 'exam-card';
                        card.innerHTML = `<span>${data[key].name}</span> <i>➔</i>`;
                        card.onclick = () => showSubCategories(key);
                        container.appendChild(card);
                    }
                }
            });
        }

        function showSubCategories(parentId) {
            database.ref('master_exams').once('value', snapshot => {
                const allData = snapshot.val();
                const overlay = document.getElementById('view-nested');
                document.getElementById('nested-title').innerText = allData[parentId].name;
                const render = document.getElementById('nested-render');
                render.innerHTML = '';

                // Find Children
                for(let key in allData) {
                    if(allData[key].parent === allData[parentId].name) {
                        render.innerHTML += `<div class="exam-card" onclick="showSubCategories('${key}')"><span>${allData[key].name}</span></div>`;
                    }
                }
                
                // Show Stages if any
                if(allData[parentId].stages) {
                    allData[parentId].stages.split(',').forEach(s => {
                        render.innerHTML += `<div class="admin-card" style="padding:15px; border-left:4px solid var(--primary);">📖 ${s.trim()}</div>`;
                    });
                }
                overlay.classList.remove('hidden');
            });
        }

        // ADMIN MODULE
        function syncDataToFirebase() {
            const n = document.getElementById('adm-name').value;
            const p = document.getElementById('adm-parent').value;
            const s = document.getElementById('adm-stages').value;
            if(!n) return alert("Exam name is required!");
            
            database.ref('master_exams/' + n).update({
                name: n, parent: p, stages: s
            }).then(() => {
                alert("Database Updated!");
                location.reload();
            });
        }

        function runAdminModule() {
            database.ref('master_exams').on('value', snapshot => {
                const list = document.getElementById('admin-exam-list');
                list.innerHTML = '<span class="section-title">Manage Database</span>';
                snapshot.forEach(child => {
                    const d = child.val();
                    list.innerHTML += `<div class="admin-card" style="display:flex; justify-content:space-between; align-items:center;">
                        <div><b>${d.name}</b><br><small>${d.parent ? 'Child of: '+d.parent : 'Main Category'}</small></div>
                        <div>
                            <button onclick="editMode('${child.key}')" style="color:var(--secondary); background:none; border:none; margin-right:15px; font-weight:bold;">EDIT</button>
                            <button onclick="database.ref('master_exams/${child.key}').remove()" style="color:red; background:none; border:none; font-weight:bold;">DELETE</button>
                        </div>
                    </div>`;
                });
            });

            database.ref('attendance_logs').on('value', snapshot => {
                const logs = document.getElementById('log-render');
                logs.innerHTML = '';
                snapshot.forEach(user => {
                    user.forEach(entry => {
                        logs.innerHTML += `<div class="log-item"><b>${user.key}:</b> ${entry.val().timestamp}</div>`;
                    });
                });
            });
        }

        function editMode(id) {
            database.ref('master_exams/'+id).once('value', s => {
                const d = s.val();
                document.getElementById('adm-name').value = d.name;
                document.getElementById('adm-parent').value = d.parent || '';
                document.getElementById('adm-stages').value = d.stages || '';
                window.scrollTo(0,0);
            });
        }

        function processLogout() { localStorage.removeItem('pro_auth_user'); location.reload(); }
    </script>
</body>
</html>
