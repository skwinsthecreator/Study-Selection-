<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Selection Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0a1122; --card-dark: #121e36; --text-white: #f1f5f9; --text-gray: #94a3b8; --upsc-grad: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); --ssc-grad: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); --teach-grad: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); --rail-grad: linear-gradient(135deg, #10b981 0%, #059669 100%); --state-grad: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); --accent: #f97316; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-white); font-size: 14px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .btn { padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; border: none; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; width: 100%; }
        .input-dark { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); color: white; border-radius: 8px; border: none; margin-bottom: 15px; }
        .card { background: var(--card-dark); padding: 20px; border-radius: 20px; margin-bottom: 15px; }

        /* Login */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1e3a8a, #0a1122); }
        .login-card { background: var(--card-dark); padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 380px; }

        /* Dashboard */
        .premium-header { display: flex; justify-content: space-between; align-items: center; padding: 25px 20px; }
        .profile-icon { width: 45px; height: 45px; background: var(--card-dark); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--accent); border: 2px solid #2a4066; font-weight: bold; }
        .notice-box { background: rgba(249, 115, 22, 0.1); border: 1px dashed var(--accent); padding: 15px; border-radius: 15px; margin: 0 20px 20px 20px; color: var(--accent); font-weight: 600; text-align: center; }
        
        .exam-grid { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .exam-card { padding: 22px; border-radius: 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: transform 0.2s; }
        .exam-info h3 { font-size: 18px; margin-bottom: 2px; }
        .exam-info p { font-size: 11px; opacity: 0.8; }

        /* Section View */
        .sub-exam-view { padding: 20px; }
        .section-header { padding: 30px 20px; border-radius: 20px; margin-bottom: 25px; }
        .section-card { background: var(--card-dark); padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; }
        .section-num { width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; justify-content: center; align-items: center; color: var(--accent); font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--card-dark); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="margin-bottom:10px;">नमस्ते</h2>
            <p style="color:var(--text-gray); margin-bottom:20px;">Ready for your career?</p>
            <input type="text" id="user-id" class="input-dark" placeholder="अपना नाम या Admin ID लिखें">
            <button onclick="login()" class="btn btn-primary">Start Learning</button>
        </div>
    </div>

    <div id="student-screen" class="hidden" style="padding-bottom: 80px;">
        <div id="dashboard-view">
            <header class="premium-header">
                <div><p style="font-size:12px; color:var(--text-gray);">WELCOME,</p><h2 id="greet-name">Student</h2></div>
                <div class="profile-icon" id="profile-init">S</div>
            </header>
            
            <div id="stu-notice" class="notice-box">📢 No new updates.</div>

            <div style="padding: 0 20px 20px 20px;"><h2 style="font-size:20px;">Select Your Exam</h2></div>
            <div class="exam-grid" id="main-exam-list"></div>

            <div id="video-display" style="padding: 20px;"></div>
        </div>

        <div id="section-view" class="hidden sub-exam-view">
            <div onclick="backToDash()" style="margin-bottom:20px; color:var(--text-gray); cursor:pointer;">← Back to Home</div>
            <div id="section-content"></div>
        </div>

        <nav class="bottom-nav">
            <div onclick="backToDash()" style="color:var(--accent); cursor:pointer; text-align:center;">🏠<br>Home</div>
            <div onclick="logout()" style="color:var(--text-gray); cursor:pointer; text-align:center;">👤<br>Logout</div>
        </nav>
    </div>

    <div id="admin-screen" class="hidden" style="padding:20px;">
        <h2 style="margin-bottom:20px; color:var(--accent);">Admin Panel</h2>
        <div class="card">
            <h3>📢 Post Global Notice</h3>
            <input type="text" id="admin-note" class="input-dark" placeholder="Update something...">
            <button onclick="updateNotice()" class="btn btn-primary">Update Notice</button>
        </div>
        <div class="card">
            <h3>📹 Post Video Class</h3>
            <input type="text" id="v-name" class="input-dark" placeholder="Chapter Name">
            <input type="text" id="v-id" class="input-dark" placeholder="YouTube Video ID">
            <button onclick="updateVideo()" class="btn btn-primary">Publish Video</button>
        </div>
        <button onclick="logout()" class="btn" style="background:#dc2626; color:white; width:100%;">Exit Admin Mode</button>
    </div>
