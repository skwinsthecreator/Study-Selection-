<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Selection - Pro Academy</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Anti-Ad Overlay Styling */
        iframe[id*="google_ads"], div[class*="adsbygoogle"], .appgeyser-ad-unit { display: none !important; visibility: hidden !important; height: 0 !important; }
        
        :root { --bg: #0a1122; --card: #121e36; --text: #f1f5f9; --gray: #94a3b8; --accent: #f97316; --upsc: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); --ssc: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
        .hidden { display: none !important; }
        
        /* Toast & UI */
        #app-toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 30px; border-radius: 50px; z-index: 9999; display: none; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { padding: 14px; border-radius: 15px; cursor: pointer; font-weight: 600; border: none; transition: 0.3s; text-align: center; }
        .btn-p { background: var(--accent); color: white; width: 100%; display: block; }
        .input-d { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); color: white; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; outline: none; }
        .card { background: var(--card); padding: 22px; border-radius: 24px; margin-bottom: 18px; border: 1px solid rgba(255,255,255,0.05); }

        /* Navigation & Ticker */
        .ticker-wrap { background: #dc2626; color: white; padding: 8px 0; overflow: hidden; white-space: nowrap; font-size: 12px; }
        .ticker { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--card); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }

        /* Exam Grid */
        .grid { padding: 0 20px; }
        .e-card { padding: 25px; border-radius: 22px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
    </style>
</head>
<body>

    <div id="app-toast">Success!</div>
    <div class="ticker-wrap"><div class="ticker" id="app-ticker">Preparing for SSC & UPSC? Check out the latest material below!</div></div>

    <div id="view-login" style="height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
            <h1 style="color:var(--accent); font-size: 30px;">Study Selection</h1>
            <p style="color:var(--gray); margin-bottom: 30px;">Premium Dashboard</p>
            <input type="text" id="user-name" class="input-d" placeholder="Enter Name or admin123">
            <button onclick="handleLogin()" class="btn btn-p">Login</button>
        </div>
    </div>

    <div id="view-student" class="hidden" style="padding-bottom: 90px;">
        <header style="padding: 25px 20px; display:flex; justify-content:space-between; align-items:center;">
            <div><h2 id="display-name">Student</h2></div>
            <div style="color:var(--accent); font-weight:bold;" onclick="doLogout()">LOGOUT</div>
        </header>

        <div style="padding: 0 20px 15px 20px;"><h3>Exam Categories</h3></div>
        <div id="exam-render" class="grid"></div>
        <div id="broadcast-render" style="padding: 20px;"></div>

        <nav>
            <div onclick="location.reload()" style="text-align:center; color:var(--accent);">🏠<br>Home</div>
            <div onclick="doLogout()" style="text-align:center; color:var(--gray);">👤<br>Logout</div>
        </nav>
    </div>

    <div id="view-admin" class="hidden">
        <header style="background:var(--card); padding: 20px; display:flex; justify-content:space-between;">
            <h2 style="color:var(--accent)">Admin Hub</h2>
            <button onclick="doLogout()" style="color:red; background:none; border:none; font-weight:bold;">EXIT</button>
        </header>

        <div style="padding: 20px;">
            <div class="card">
                <h4>Add/Edit Exam</h4>
                <input type="text" id="in-ex-name" class="input-d" placeholder="Exam Name (e.g. SSC)">
                <input type="text" id="in-ex-desc" class="input-d" placeholder="Short Description">
                <input type="text" id="in-ex-secs" class="input-d" placeholder="Stages (e.g. CGL, CHSL, MTS)">
                <button onclick="adminAddExam()" class="btn btn-p">Save & Sync</button>
            </div>
            <div id="adm-exams-list"></div>
            <div class="card" id="history-logs" style="font-size:11px; margin-top:20px;">Logs loading...</div>
        </div>
    </div>

    <div id="view-sections" class="hidden full-page">
        <div onclick="this.parentElement.classList.add('hidden')" style="margin-bottom:20px; color:var(--gray); font-weight:bold; cursor:pointer;">← BACK</div>
        <div id="sections-render"></div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAssYG20lFBlE6pHdVMZjuN-7mN-K3Yx1M",
          authDomain: "study-selection.firebaseapp.com",
          databaseURL: "https://study-selection-default-rtdb.firebaseio.com",
          projectId: "study-selection",
          storageBucket: "study-selection.appspot.com",
          messagingSenderId: "511233122426",
          appId: "1:511233122426:web:7a4fb8e0df62f0f803f262"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ANTI-AD LOGIC (Runs every 2 seconds)
        setInterval(() => {
            const ads = document.querySelectorAll('iframe, .appgeyser-ad-unit, [id*="ads"]');
            ads.forEach(ad => ad.remove());
        }, 2000);

        function showToast(msg) {
            const t = document.getElementById('app-toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function handleLogin() {
            const name = document.getElementById('user-name').value.trim();
            if(!name) return;
            localStorage.setItem('activeSession', name);
            if(name.toLowerCase() !== 'admin123') {
                db.ref('attendance/' + name.replace(/\s/g,'_')).push({ time: new Date().toLocaleString() });
            }
            location.reload();
        }

        window.onload = () => {
            const user = localStorage.getItem('activeSession');
            if(!user) return;
            document.getElementById('view-login').classList.add('hidden');
            if(user.toLowerCase() === 'admin123') {
                document.getElementById('view-admin').classList.remove('hidden');
                loadAdminTools();
            } else {
                document.getElementById('view-student').classList.remove('hidden');
                document.getElementById('display-name').innerText = user;
                initStudentView();
            }
        };

        const defaultExams = {
            "SSC": {name:"SSC", desc:"Staff Selection Commission", sections:"CGL, CHSL, MTS, GD Constable, CPO, Stenographer"},
            "UPSC": {name:"UPSC", desc:"Civil Services Examination", sections:"Prelims, Mains, Interview"},
            "Teaching": {name:"Teaching", desc:"CTET & State TETs", sections:"Paper 1, Paper 2"},
            "Police": {name:"Police", desc:"State Constable & SI", sections:"Written, Physical, Medical"}
        };

        function initStudentView() {
            db.ref('exams').on('value', s => {
                const data = s.val() || defaultExams;
                const container = document.getElementById('exam-render');
                container.innerHTML = '';
                for(let k in data) {
                    const ex = data[k];
                    let grad = ex.name.includes('SSC') ? 'var(--ssc)' : 'var(--upsc)';
                    container.innerHTML += `<div class="e-card" style="background:${grad}" onclick="openExSections('${k}')"><div><h3>${ex.name}</h3><p style="font-size:11px; opacity:0.8;">${ex.desc}</p></div><div style="margin-left:auto;">→</div></div>`;
                }
            });
        }

        function openExSections(id) {
            db.ref('exams/'+id).once('value', s => {
                const ex = s.val() || defaultExams[id];
                document.getElementById('view-sections').classList.remove('hidden');
                let sArr = ex.sections.split(',');
                let html = `<div style="padding:40px 20px; background:var(--ssc); border-radius:25px; margin-bottom:20px;"><h1>${ex.name}</h1><p>${ex.desc}</p></div>`;
                sArr.forEach((v, i) => {
                    html += `<div style="background:var(--card); padding:20px; border-radius:18px; margin-bottom:12px; display:flex; align-items:center; gap:15px;"><div style="color:var(--accent); font-weight:bold;">${i+1}</div><h3>${v.trim()}</h3></div>`;
                });
                document.getElementById('sections-render').innerHTML = html;
            });
        }

        function adminAddExam() {
            const n = document.getElementById('in-ex-name').value;
            const d = document.getElementById('in-ex-desc').value;
            const s = document.getElementById('in-ex-secs').value;
            if(!n) return;
            db.ref('exams/'+n).set({name:n, desc:d, sections:s}).then(()=> { 
                showToast("Updated Successfully!");
                document.getElementById('in-ex-name').value=''; 
                document.getElementById('in-ex-desc').value=''; 
                document.getElementById('in-ex-secs').value='';
            });
        }

        function loadAdminTools() {
            db.ref('exams').on('value', s => {
                const list = document.getElementById('adm-exams-list');
                list.innerHTML = '<h4>Existing Exams:</h4>';
                const data = s.val() || defaultExams;
                for(let k in data) {
                    list.innerHTML += `<div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                        <span>${data[k].name}</span>
                        <div>
                            <button onclick="editExam('${k}')" style="color:var(--accent); background:none; border:none; font-weight:bold; margin-right:15px; cursor:pointer;">EDIT</button>
                            <button onclick="db.ref('exams/${k}').remove()" style="color:red; background:none; border:none; font-weight:bold; cursor:pointer;">DELETE</button>
                        </div>
                    </div>`;
                }
            });
            db.ref('attendance').on('value', s => {
                let h = '<h4>Student Logs:</h4>';
                s.forEach(u => {
                    h += `<br><b>${u.key}:</b><br>`;
                    u.forEach(l => { h += `• ${l.val().time}<br>`; });
                });
                document.getElementById('history-logs').innerHTML = h;
            });
        }

        function editExam(id) {
            db.ref('exams/'+id).once('value', s => {
                const ex = s.val() || defaultExams[id];
                document.getElementById('in-ex-name').value = ex.name;
                document.getElementById('in-ex-desc').value = ex.desc;
                document.getElementById('in-ex-secs').value = ex.sections;
                showToast("Data loaded for Editing");
            });
        }

        function doLogout() { localStorage.removeItem('activeSession'); location.reload(); }
    </script>
</body>
</html>
