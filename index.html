<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Selection</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* 🚫 PERMANENT AD-BLOCKER (FORCED) */
        iframe, ins, .appgeyser-ad-unit, [id*="ads"], [class*="ads"], [id*="p_"], 
        div[style*="z-index: 2147483647"], div[style*="fixed"] { 
            display: none !important; visibility: hidden !important; opacity: 0 !important; 
            pointer-events: none !important; height: 0 !important; width: 0 !important;
        }

        :root { --bg: #0a1122; --card: #121e36; --accent: #f97316; --text: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* UI Elements */
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .input-d { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); color: white; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; outline: none; }
        .btn-p { background: var(--accent); color: white; padding: 15px; border-radius: 15px; border: none; width: 100%; font-weight: 600; cursor: pointer; }
        .e-card { padding: 20px; border-radius: 18px; margin-bottom: 12px; cursor: pointer; background: #1e293b; display: flex; justify-content: space-between; align-items: center; }

        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="view-login" style="height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
            <h2 style="color:var(--accent); margin-bottom: 20px;">Study Selection</h2>
            <input type="text" id="user-name" class="input-d" placeholder="Enter Name">
            <button onclick="handleLogin()" class="btn-p">Login</button>
        </div>
    </div>

    <div id="view-student" class="hidden" style="padding: 20px; padding-bottom: 100px;">
        <h3 id="display-name" style="margin-bottom: 20px; color: var(--accent);">Welcome</h3>
        <div id="exam-list"></div>
        <nav>
            <div onclick="location.reload()" style="cursor:pointer; color:var(--accent);">🏠 Home</div>
            <div onclick="doLogout()" style="cursor:pointer;">👤 Logout</div>
        </nav>
    </div>

    <div id="view-admin" class="hidden" style="padding: 20px;">
        <div class="card">
            <h3>Admin Panel</h3>
            <input type="text" id="in-name" class="input-d" placeholder="Exam Name (CGL, CHSL)">
            <input type="text" id="in-parent" class="input-d" placeholder="Parent Category (SSC)">
            <input type="text" id="in-secs" class="input-d" placeholder="Stages (Tier 1, Tier 2)">
            <button onclick="adminSave()" class="btn-p">Save Exam</button>
        </div>
        <div id="adm-exams"></div>
        <div class="card" style="margin-top:20px;">
            <h4>Login History</h4>
            <div id="adm-logs" style="font-size: 12px; color: #94a3b8;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAssYG20lFBlE6pHdVMZjuN-7mN-K3Yx1M",
          authDomain: "study-selection.firebaseapp.com",
          databaseURL: "https://study-selection-default-rtdb.firebaseio.com",
          projectId: "study-selection",
          storageBucket: "study-selection.appspot.com",
          messagingSenderId: "511233122426",
          appId: "1:511233122426:web:7a4fb8e0df62f0f803f262"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🛡️ AD-BLOCKER ENGINE (Mutation Observer)
        const observer = new MutationObserver((mutations) => {
            mutations.forEach(() => {
                const ads = document.querySelectorAll('iframe, ins, .appgeyser-ad-unit, [id*="ads"], [id*="p_"]');
                ads.forEach(ad => ad.remove());
            });
        });
        observer.observe(document.body, { childList: true, subtree: true });

        function handleLogin() {
            const name = document.getElementById('user-name').value.trim();
            if(!name) return;
            if(name.toLowerCase() !== 'admin123') {
                db.ref('attendance/' + name.replace(/\s/g,'_')).push({ time: new Date().toLocaleString() });
            }
            localStorage.setItem('studyUser', name);
            location.reload();
        }

        window.onload = () => {
            const user = localStorage.getItem('studyUser');
            if(!user) return;
            document.getElementById('view-login').classList.add('hidden');
            if(user.toLowerCase() === 'admin123') {
                document.getElementById('view-admin').classList.remove('hidden');
                loadAdmin();
            } else {
                document.getElementById('view-student').classList.remove('hidden');
                document.getElementById('display-name').innerText = "Namaste, " + user;
                loadStudent();
            }
        };

        function loadStudent() {
            db.ref('exams').on('value', s => {
                const data = s.val();
                const container = document.getElementById('exam-list');
                container.innerHTML = '';
                for(let k in data) {
                    if(!data[k].parent) {
                        container.innerHTML += `<div class="e-card"><h3>${data[k].name}</h3></div>`;
                    }
                }
            });
        }

        function adminSave() {
            const n = document.getElementById('in-name').value;
            const p = document.getElementById('in-parent').value;
            const s = document.getElementById('in-secs').value;
            if(!n) return;
            db.ref('exams/'+n).update({name:n, parent:p, secs:s}).then(() => location.reload());
        }

        function loadAdmin() {
            db.ref('exams').on('value', s => {
                const list = document.getElementById('adm-exams');
                list.innerHTML = '<h4>Existing Exams:</h4>';
                s.forEach(c => {
                    list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <span>${c.val().name}</span>
                        <div>
                            <button onclick="editExam('${c.key}')" style="color:orange; background:none; border:none; margin-right:10px;">Edit</button>
                            <button onclick="db.ref('exams/${c.key}').remove()" style="color:red; background:none; border:none;">Delete</button>
                        </div>
                    </div>`;
                });
            });
            db.ref('attendance').on('value', s => {
                let h = '';
                s.forEach(u => {
                    h += `<b>${u.key}:</b><br>`;
                    u.forEach(l => { h += `• ${l.val().time}<br>`; });
                });
                document.getElementById('adm-logs').innerHTML = h || "No logs.";
            });
        }

        function editExam(id) {
            db.ref('exams/'+id).once('value', s => {
                const d = s.val();
                document.getElementById('in-name').value = d.name;
                document.getElementById('in-parent').value = d.parent || '';
                document.getElementById('in-secs').value = d.secs || '';
                window.scrollTo(0,0);
            });
        }

        function doLogout() { localStorage.removeItem('studyUser'); location.reload(); }
    </script>
</body>
</html>
