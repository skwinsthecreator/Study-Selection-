<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Selection Ultra Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a1122; --card: #121e36; --text: #f1f5f9; --gray: #94a3b8; --accent: #f97316; --upsc: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); --ssc: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); font-size: 14px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .btn { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; border: none; transition: 0.2s; }
        .btn-p { background: var(--accent); color: white; width: 100%; }
        .input-d { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); color: var(--text); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }

        /* Custom UI Components */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 10px 25px; border-radius: 30px; z-index: 1000; display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.4); font-weight: 600; }
        .ticker-wrap { background: #dc2626; color: white; padding: 7px 0; overflow: hidden; white-space: nowrap; font-size: 11px; font-weight: 600; }
        .ticker { display: inline-block; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Navigation */
        header { display: flex; justify-content: space-between; align-items: center; padding: 25px 20px; }
        .profile-icon { width: 45px; height: 45px; background: var(--card); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #2a4066; color: var(--accent); font-weight: bold; }
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }

        /* Exam Cards & Sections */
        .grid { padding: 0 20px; }
        .e-card { padding: 22px; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .e-card:active { transform: scale(0.96); }
        .sub-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 50; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .s-header { padding: 40px 20px; border-radius: 25px; margin-bottom: 20px; background: var(--upsc); }
        .s-card { background: var(--card); padding: 20px; border-radius: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; }
        .s-num { width: 35px; height: 35px; background: rgba(255,255,255,0.1); border-radius: 10px; display: flex; justify-content: center; align-items: center; color: var(--accent); font-weight: bold; }

        /* Admin Layout */
        .adm-nav { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; margin-bottom: 15px; }
        .tab-btn { background: var(--card); color: var(--gray); padding: 8px 20px; border-radius: 20px; white-space: nowrap; font-size: 12px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div id="toast">Update Success!</div>
    <div class="ticker-wrap"><div class="ticker" id="live-ticker">Exam Updates: New material uploaded for UPSC & SSC. Best of luck for your exams!</div></div>

    <div id="login-screen">
        <div class="card" style="width: 88%; max-width: 380px; text-align: center; padding: 40px;">
            <h1 style="color:var(--accent); font-size: 28px;">Study Selection</h1>
            <p style="color:var(--gray); margin-bottom: 30px;">Premium Learning Platform</p>
            <input type="text" id="user-id" class="input-d" placeholder="Enter Full Name">
            <button onclick="handleLogin()" class="btn btn-p" style="margin-top: 10px;">Login</button>
        </div>
    </div>
