<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selection Will - Admin Control Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        iframe, ins, .appgeyser-ad-unit { display: none !important; }
        :root { --sw-blue: #0052cc; --sw-bg: #f4f7fa; --sw-text: #172b4d; --sw-white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--sw-bg); color: var(--sw-text); }

        /* LOGIN */
        #auth-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 30px; background: var(--sw-blue); text-align: center; color: white; }
        .auth-input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: none; outline: none; }

        /* HEADER */
        .sw-header { background: var(--sw-blue); padding: 30px 20px 20px 20px; color: white; border-radius: 0 0 25px 25px; }
        
        /* GRID & CARDS */
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .cat-icon { background: var(--sw-white); width: 55px; height: 55px; border-radius: 15px; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .cat-item p { font-size: 10px; text-align: center; font-weight: 600; }

        .batch-card { background: var(--sw-white); margin: 0 20px 15px; border-radius: 15px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; }
        
        /* ADMIN UI */
        .admin-panel { padding: 20px; }
        .admin-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ddd; }
        .admin-btn { padding: 12px; border-radius: 8px; border: none; color: white; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; }
        .edit-btn { background: #ffab00; color: black; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
        .del-btn { background: #ff5252; color: white; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; margin-left: 5px; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: none; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
        .nav-link { text-align: center; color: #7a869a; font-size: 11px; cursor: pointer; }
        .nav-link.active { color: var(--sw-blue); font-weight: 700; }

        .page { display: none; padding-bottom: 80px; }
        .active-page { display: block; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1>Selection Will</h1>
        <p style="margin-bottom: 30px; opacity: 0.8;">Admin & Student Portal</p>
        <input type="text" id="login-id" class="auth-input" placeholder="Enter Name or Admin ID">
        <button onclick="login()" style="width:100%; padding:16px; border-radius:12px; border:none; background:#ffab00; font-weight:700;">PROCEED</button>
    </div>

    <div id="page-home" class="page">
        <div class="sw-header">
            <h2>Selection Will</h2>
            <p id="welcome-msg">Welcome, Student</p>
        </div>
        <div class="cat-grid" id="category-render">
            </div>
        <div style="padding: 0 20px;"><h3>Available Batches</h3></div>
        <div id="batch-render" style="margin-top: 15px;">
            </div>
    </div>

    <div id="page-admin" class="page">
        <div class="sw-header"><h1>Admin Control</h1></div>
        <div class="admin-panel">
            <div class="admin-card">
                <h3>Add/Update Exam Batch</h3>
                <input type="hidden" id="edit-key">
                <input type="text" id="ad-name" class="auth-input" style="border:1px solid #ddd; margin-top:10px;" placeholder="Batch/Exam Name">
                <input type="text" id="ad-cat" class="auth-input" style="border:1px solid #ddd;" placeholder="Category (e.g. SSC, UPSC)">
                <button id="main-admin-btn" onclick="saveToDB()" class="admin-btn" style="background: var(--sw-blue);">PUBLISH BATCH</button>
                <button id="cancel-edit" onclick="resetAdminForm()" class="admin-btn" style="background: gray; display:none;">CANCEL EDIT</button>
            </div>

            <h3>Manage Active Content</h3>
            <div id="admin-list-render"></div>
        </div>
    </div>

    <div id="page-library" class="page" style="padding:20px;"><h1>E-Library</h1></div>
    <div id="page-downloads" class="page" style="padding:20px;"><h1>Downloads</h1></div>
    <div id="page-profile" class="page" style="padding:20px;">
        <h1>Account</h1>
        <button onclick="logout()" class="admin-btn" style="background:red; width:200px; margin-top:20px;">LOGOUT</button>
    </div>

    <nav id="main-nav">
        <div class="nav-link active" onclick="showP('home')">🏠<br>Home</div>
        <div class="nav-link" onclick="showP('library')">📚<br>Library</div>
        <div class="nav-link" onclick="showP('downloads')">📥<br>Downloads</div>
        <div class="nav-link" onclick="showP('profile')">👤<br>Account</div>
    </nav>

    <script>
        // CONFIG
        const firebaseConfig = { databaseURL: "https://study-selection-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            const id = document.getElementById('login-id').value;
            if(!id) return alert("Enter ID");
            localStorage.setItem('sw_user', id);
            location.reload();
        }

        window.onload = () => {
            const user = localStorage.getItem('sw_user');
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                document.getElementById('welcome-msg').innerText = "Hello, " + user;
                
                if(user.toLowerCase() === 'admin123') showP('admin');
                else showP('home');
                
                fetchData();
            }
        };

        // FULL CONTROL LOGIC
        function saveToDB() {
            const name = document.getElementById('ad-name').value;
            const cat = document.getElementById('ad-cat').value;
            const key = document.getElementById('edit-key').value;

            if(!name || !cat) return alert("Fill all fields");

            if(key) {
                // UPDATE
                db.ref('batches/' + key).update({ name, cat });
                alert("Updated Successfully!");
            } else {
                // ADD NEW
                db.ref('batches').push({ name, cat });
                alert("Published Live!");
            }
            resetAdminForm();
        }

        function fetchData() {
            db.ref('batches').on('value', snap => {
                const data = snap.val();
                const homeCont = document.getElementById('batch-render');
                const adminCont = document.getElementById('admin-list-render');
                const catCont = document.getElementById('category-render');
                
                homeCont.innerHTML = "";
                adminCont.innerHTML = "";
                
                let cats = new Set();

                for(let id in data) {
                    const item = data[id];
                    cats.add(item.cat);

                    // Student View
                    homeCont.innerHTML += `
                        <div class="batch-card">
                            <strong>${item.name}</strong><br>
                            <small style="color:var(--sw-blue)">${item.cat} Special</small>
                        </div>
                    `;

                    // Admin View (With Edit/Delete)
                    adminCont.innerHTML += `
                        <div class="admin-card">
                            <strong>${item.name}</strong> (${item.cat})
                            <div style="margin-top:10px;">
                                <button class="edit-btn" onclick="prepEdit('${id}', '${item.name}', '${item.cat}')">EDIT</button>
                                <button class="del-btn" onclick="deleteItem('${id}')">DELETE</button>
                            </div>
                        </div>
                    `;
                }

                // Render Unique Categories
                catCont.innerHTML = Array.from(cats).map(c => `
                    <div class="cat-item">
                        <div class="cat-icon">🎓</div>
                        <p>${c}</p>
                    </div>
                `).join('');
            });
        }

        function prepEdit(key, name, cat) {
            document.getElementById('edit-key').value = key;
            document.getElementById('ad-name').value = name;
            document.getElementById('ad-cat').value = cat;
            document.getElementById('main-admin-btn').innerText = "UPDATE CHANGES";
            document.getElementById('main-admin-btn').style.background = "orange";
            document.getElementById('cancel-edit').style.display = "block";
        }

        function deleteItem(key) {
            if(confirm("Are you sure you want to delete this?")) {
                db.ref('batches/' + key).remove();
            }
        }

        function resetAdminForm() {
            document.getElementById('edit-key').value = "";
            document.getElementById('ad-name').value = "";
            document.getElementById('ad-cat').value = "";
            document.getElementById('main-admin-btn').innerText = "PUBLISH BATCH";
            document.getElementById('main-admin-btn').style.background = "var(--sw-blue)";
            document.getElementById('cancel-edit').style.display = "none";
        }

        function showP(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + id).classList.add('active-page');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            event.currentTarget?.classList?.add('active');
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
